# ---------------------------------------------------------------------------
# abf.conf  --  Framework configuration
# ---------------------------------------------------------------------------

# Logging
ABF_LOG_DIR="/var/log/abf"
ABF_CACHE_DIR="/var/cache/abf"
ABF_TEMP_DIR="/tmp/abf"

# Default storage backend
ABF_STORAGE_BACKEND="onedrive"

# Restic repository password file (required for encryption)
# Create with: echo "your-password" > /etc/abf/restic-password
ABF_RESTIC_PASSWORD_FILE="/etc/abf/restic-password"

# Retention policy (applied after each backup via restic forget)
ABF_RETENTION_KEEP_DAILY=7
ABF_RETENTION_KEEP_WEEKLY=4
ABF_RETENTION_KEEP_MONTHLY=3
ABF_RETENTION_KEEP_YEARLY=0
