# ---------------------------------------------------------------------------
# abf.conf  --  Framework configuration
# ---------------------------------------------------------------------------

# Logging (override for production: /var/log/abf)
ABF_LOG_DIR="/tmp/abf/logs"
ABF_CACHE_DIR="/tmp/abf/cache"
ABF_TEMP_DIR="/tmp/abf"

# Lock directory (prevents concurrent backups)
ABF_LOCK_DIR="/tmp/abf/locks"

# Default storage backend (local, onedrive, umbrel)
ABF_STORAGE_BACKEND="local"

# Restic repository password file (required for encryption)
# Create with: echo "your-password" > /etc/abf/restic-password
ABF_RESTIC_PASSWORD_FILE="/etc/abf/restic-password"

# Retention policy (applied after each backup via restic forget)
ABF_RETENTION_KEEP_DAILY=7
ABF_RETENTION_KEEP_WEEKLY=4
ABF_RETENTION_KEEP_MONTHLY=3
ABF_RETENTION_KEEP_YEARLY=0

# Destination sync (comma-separated list of destinations to sync after backup)
# Supported: local, onedrive
# Local: syncs to LOCAL_DESTINATION_PATH (default: /mnt/umbrel/backups/restic)
# OneDrive: syncs to ONEDRIVE_REMOTE:ONEDRIVE_PATH
# See /etc/abf/destinations/ for per-destination configuration.
BACKUP_DESTINATIONS=""
