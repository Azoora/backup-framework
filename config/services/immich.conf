# ---------------------------------------------------------------------------
# Immich service configuration  --  User overrides
#
# These values override the defaults in services/immich/service.conf.
# Only set values you want to change from the defaults.
# ---------------------------------------------------------------------------

# Paths
# SERVICE_IMMICH_DATA_DIR="/var/lib/immich"
# SERVICE_IMMICH_BACKUP_DIR="/tmp/abf/immich"

# Component toggles
# SERVICE_IMMICH_BACKUP_DATABASE=true
# SERVICE_IMMICH_BACKUP_UPLOADS=true
# SERVICE_IMMICH_BACKUP_THUMBNAILS=true
# SERVICE_IMMICH_BACKUP_ENCODING=true
# SERVICE_IMMICH_BACKUP_CONFIG=true

# Database connection (used by pg_dump for consistent PostgreSQL backups)
# IMMICH_DB_HOST="localhost"
# IMMICH_DB_PORT=5432
# IMMICH_DB_NAME="immich"
# IMMICH_DB_USER="postgres"
# IMMICH_DB_PASSWORD=""
