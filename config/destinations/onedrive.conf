# OneDrive (Rclone) destination configuration
# Syncs the Restic repository to Microsoft OneDrive via rclone.
# Requires rclone to be configured: rclone config

# Name of the rclone remote (configured via "rclone config")
ONEDRIVE_REMOTE="OneDrive"

# Path within the remote where backups will be stored (base path; per-service repos use Backups/<hostname>/<Service>)
ONEDRIVE_PATH="Backups"
